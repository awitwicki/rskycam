name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches Cargo.toml version
        if: github.ref_type == 'tag'
        run: |
          cargo_version=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "tag $GITHUB_REF_NAME != Cargo.toml version $cargo_version" >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Cross-compile aarch64 (glibc 2.36, embedded UI)
        run: cargo zigbuild --release --locked --target aarch64-unknown-linux-gnu.2.36 --features embed-ui

      - name: Package tarball
        run: |
          staging=$(mktemp -d)
          cp target/aarch64-unknown-linux-gnu/release/rskycam "$staging/"
          cp installer/rskycam.service installer/99-asi.rules installer/install.sh "$staging/"
          cp LICENSE assets/asi/ASI-LICENSE "$staging/"
          tar -C "$staging" -czf rskycam-aarch64.tar.gz \
            rskycam rskycam.service 99-asi.rules install.sh LICENSE ASI-LICENSE
          sha256sum rskycam-aarch64.tar.gz > rskycam-aarch64.tar.gz.sha256

      - name: Upload dry-run artifact
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: rskycam-aarch64
          path: |
            rskycam-aarch64.tar.gz
            rskycam-aarch64.tar.gz.sha256

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rskycam-aarch64.tar.gz
            rskycam-aarch64.tar.gz.sha256
          generate_release_notes: true
